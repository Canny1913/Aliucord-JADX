name: Build & Publish Plugin

on:
  push:
    tags: [ "*.*.*" ]

concurrency:
  group: "release"
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: 11
          distribution: zulu

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-write-only: true

      - name: Build with Gradle
        run: |
          ./gradlew build dist --stacktrace

      - name: Publish Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ github.ref_name }}"
          plugin_file="aliucord-jadx-$tag.jar"
          mv -T ./build/dist/aliucord-jadx.jar "./$plugin_file"

          gh release create "$tag" \
            --title "v$tag" \
            --generate-notes \
            --verify-tag \
            --fail-on-no-commits \
            "./$plugin_file"
